<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro - Tienda Online</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="auth-page">
  <main class="container" style="max-width:420px;">
    <div class="text-center mb-4">
      <a href="index.html" class="text-decoration-none">
        <h1 class="fw-bold" style="color:#ffe600;">Tienda Online</h1>
      </a>
    </div>
    <div class="card login-card p-4">
      <h2 class="h4 mb-3 text-center">Crear Cuenta</h2>
      <form id="registroForm">
        <div class="mb-3">
          <label for="nombre" class="form-label">Nombre completo</label>
          <input type="text" class="form-control" id="nombre" placeholder="Tu nombre" required>
        </div>
        <div class="mb-3">
          <label for="email" class="form-label">Correo electrónico</label>
          <input type="email" class="form-control" id="email" placeholder="tu@correo.com" required>
        </div>
        <div class="mb-3">
          <label for="password" class="form-label">Contraseña</label>
          <input type="password" class="form-control" id="password" placeholder="Mínimo 6 caracteres" required>
        </div>
        <button type="submit" class="btn btn-dark w-100 py-2 fw-semibold">Registrarse</button>
      </form>
      <div id="registroMsg" class="mt-3"></div>
      <p class="mt-3 mb-0 text-center small">¿Ya tienes cuenta? <a href="login.html" class="fw-semibold">Inicia sesión aquí</a></p>
    </div>
  </main>
  <script>
    document.getElementById('registroForm').onsubmit = async function(e) {
      e.preventDefault();
      const nombre = document.getElementById('nombre').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const msg = document.getElementById('registroMsg');
      const btn = this.querySelector('button[type="submit"]');
      msg.textContent = '';
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span> Registrando...';
      try {
        const res = await fetch(`${API_BASE}/usuario/registro`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ nombre, email, password })
        });
        const data = await res.json();
        if (res.ok) {
          msg.innerHTML = '<div class="alert alert-success">Registro exitoso. ¡Bienvenido!</div>';
          setTimeout(()=>location.href='login.html', 800);
        } else {
          msg.innerHTML = '<div class="alert alert-danger">' + (data.error || 'Error al registrar') + '</div>';
          btn.disabled = false;
          btn.textContent = 'Registrarse';
        }
      } catch {
        msg.innerHTML = '<div class="alert alert-danger">Error de conexión.</div>';
        btn.disabled = false;
        btn.textContent = 'Registrarse';
      }
    }
  </script>
  <script src="config.js"></script>
</body>
</html>
