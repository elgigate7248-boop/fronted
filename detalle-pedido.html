<!DOCTYPE html>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="styles.css">
  <style>
    .tracker-step { display:flex; flex-direction:column; align-items:center; flex:1; position:relative; }
    .tracker-step:not(:last-child)::after { content:''; position:absolute; top:18px; left:50%; width:100%; height:2px; background:#dee2e6; z-index:0; }
    .tracker-step.done::after, .tracker-step.active::after { background:#0d6efd; }
    .step-circle { width:36px; height:36px; border-radius:50%; border:2px solid #dee2e6; background:#fff; display:flex; align-items:center; justify-content:center; font-size:14px; z-index:1; position:relative; }
    .tracker-step.done .step-circle  { background:#0d6efd; border-color:#0d6efd; color:#fff; }
    .tracker-step.active .step-circle { background:#0d6efd; border-color:#0d6efd; color:#fff; box-shadow:0 0 0 4px rgba(13,110,253,.2); }
    .tracker-step.cancelled .step-circle { background:#dc3545; border-color:#dc3545; color:#fff; }
    .step-label { font-size:11px; text-align:center; margin-top:6px; color:#6c757d; line-height:1.3; }
    .tracker-step.done .step-label, .tracker-step.active .step-label { color:#0d6efd; font-weight:600; }
    .tracker-step.cancelled .step-label { color:#dc3545; font-weight:600; }
    .eta-badge { background:linear-gradient(135deg,#667eea,#764ba2); color:#fff; border-radius:12px; padding:12px 20px; }
  </style>
</head>
