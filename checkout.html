<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout - Tienda Online</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="styles.css">
  <style>
    .step-bar { display:flex; align-items:center; justify-content:center; gap:0; padding:16px 0; }
    .step-item { display:flex; flex-direction:column; align-items:center; min-width:90px; }
    .step-item:not(:last-child)::after { content:''; position:absolute; top:16px; left:calc(50% + 18px); width:calc(100% - 36px); height:2px; background:#dee2e6; }
    .step-circle { width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:700; background:#dee2e6; color:#6c757d; }
    .step-circle.done  { background:#198754; color:#fff; }
    .step-circle.active { background:#0d6efd; color:#fff; }
    .step-label { font-size:11px; margin-top:4px; color:#6c757d; }
    .step-label.active { color:#0d6efd; font-weight:600; }
    .eta-box { background:linear-gradient(135deg,#e0f2fe,#f0fdf4); border:1px solid #bfdbfe; border-radius:10px; padding:12px 16px; }
  </style>
</head>
<body>
  <header class="ml-header">
    <div class="container py-2">
      <div class="d-flex gap-3 align-items-center">
        <a class="ml-brand" href="index.html">Tienda Online</a>
        <form class="flex-grow-1" role="search" onsubmit="return false;">
          <input class="form-control" type="search" placeholder="Buscar productos, marcas y más..." aria-label="Buscar">
        </form>
        <a class="btn btn-outline-dark position-relative" href="carrito.html" aria-label="Carrito">
          Carrito
          <span id="cartCount" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" style="display:none;">0</span>
        </a>
      </div>
      <div class="d-flex gap-3 mt-2 small align-items-center flex-wrap">
        <a class="text-dark text-decoration-none" href="categorias.html">Categorías</a>
        <a class="text-dark text-decoration-none" href="producto.html">Productos</a>
        <a class="text-dark text-decoration-none" href="mis-pedidos.html">Mis pedidos</a>
        <span id="navAdmin" style="display:none;"><a class="text-dark text-decoration-none" href="admin.html">Administración</a></span>
        <span id="navGuest"><a class="text-dark text-decoration-none" href="login.html">Iniciar sesión</a> <a class="text-dark text-decoration-none" href="registro.html">Registrarse</a></span>
        <span id="navUser" style="display:none;" class="ms-auto d-flex gap-3 align-items-center">
          <a class="text-dark text-decoration-none" href="perfil.html"><span id="navUserName">Mi cuenta</span></a>
          <button class="btn btn-sm btn-outline-dark" type="button" id="btnLogout">Cerrar sesión</button>
        </span>
      </div>
    </div>
  </header>

  <nav class="bg-light border-bottom">
    <div class="container py-2">
      <a href="carrito.html" class="text-decoration-none text-muted"><i class="fas fa-arrow-left me-1"></i>Volver al carrito</a>
    </div>
  </nav>
  <!-- Steps -->
  <div class="bg-white border-bottom">
    <div class="container">
      <div class="d-flex align-items-center justify-content-center gap-0 py-3">
        <div class="d-flex flex-column align-items-center" style="min-width:80px;">
          <div class="step-circle done"><i class="fas fa-check" style="font-size:11px;"></i></div>
          <div class="step-label">Carrito</div>
        </div>
        <div class="flex-grow-1" style="height:2px;background:#0d6efd;max-width:80px;"></div>
        <div class="d-flex flex-column align-items-center" style="min-width:80px;">
          <div class="step-circle active">2</div>
          <div class="step-label active">Envío</div>
        </div>
        <div class="flex-grow-1" style="height:2px;background:#dee2e6;max-width:80px;"></div>
        <div class="d-flex flex-column align-items-center" style="min-width:80px;">
          <div class="step-circle">3</div>
          <div class="step-label">Confirmación</div>
        </div>
      </div>
    </div>
  </div>

  <main class="container my-4">
    <div class="row g-4">
      <div class="col-lg-7">
        <div class="card shadow-sm p-4">
          <h2 class="h4 mb-3">Datos de envío</h2>
          <form id="checkoutForm">
            <div class="row g-3 mb-3">
              <div class="col-md-7">
                <label for="nombreDestinatario" class="form-label fw-semibold"><i class="fas fa-user me-1 text-primary"></i>Nombre del destinatario</label>
                <input type="text" class="form-control" id="nombreDestinatario" placeholder="Nombre completo de quien recibe" required>
              </div>
              <div class="col-md-5">
                <label for="telefono" class="form-label fw-semibold"><i class="fas fa-phone me-1 text-primary"></i>Teléfono</label>
                <input type="tel" class="form-control" id="telefono" placeholder="300 123 4567" required>
              </div>
            </div>
            <div class="mb-3">
              <label for="direccion" class="form-label fw-semibold"><i class="fas fa-map-marker-alt me-1 text-danger"></i>Dirección de envío</label>
              <input type="text" class="form-control" id="direccion" placeholder="Calle, número, colonia..." required>
            </div>
            <div class="row g-3">
              <div class="col-md-6">
                <label for="depto" class="form-label fw-semibold">Departamento</label>
                <select class="form-select" id="depto" required>
                  <option value="">Seleccionar...</option>
                </select>
              </div>
              <div class="col-md-6">
                <label for="ciudad" class="form-label fw-semibold">Ciudad</label>
                <select class="form-select" id="ciudad" required disabled>
                  <option value="">Seleccionar...</option>
                </select>
              </div>
            </div>
            <!-- ETA estimada -->
            <div id="etaEstimada" class="eta-box my-3" style="display:none;">
              <div class="d-flex align-items-center gap-2">
                <i class="fas fa-shipping-fast text-primary fs-5"></i>
                <div>
                  <div class="fw-semibold small">Entrega estimada</div>
                  <div id="etaTexto" class="text-muted small"></div>
                </div>
              </div>
            </div>
            <div class="mb-3">
              <label for="indicaciones" class="form-label fw-semibold">Indicaciones para la entrega <span class="fw-normal text-muted">(opcional)</span></label>
              <textarea class="form-control" id="indicaciones" rows="2" placeholder="Ej: Entre calles, color del edificio, no tiene timbre."></textarea>
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold"><i class="fas fa-credit-card me-1 text-primary"></i>Método de pago</label>
              <select class="form-select" id="metodoPago">
                <option value="efectivo">Pago contra entrega (efectivo)</option>
                <option value="transferencia">Transferencia bancaria</option>
                <option value="tarjeta">Tarjeta de crédito/débito</option>
              </select>
            </div>
            <button type="submit" class="btn btn-success w-100 py-2 fw-semibold mt-3 fs-5">
              <i class="fas fa-lock me-2"></i>Confirmar Pedido
            </button>
          </form>
          <div id="checkoutMsg" class="mt-3"></div>
        </div>
      </div>
      <div class="col-lg-5">
        <div class="card shadow-sm p-4">
          <h2 class="h5 mb-3">Resumen del pedido</h2>
          <div id="resumen"></div>
        </div>
      </div>
    </div>
  </main>

  <footer class="bg-dark text-white text-center py-3 mt-5">
    <div class="container small">© 2025 Tienda Online — Todos los derechos reservados</div>
  </footer>

  <script src="config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="auth-ui.js"></script>
  <script src="checkout.js"></script>
</body>
</html>
