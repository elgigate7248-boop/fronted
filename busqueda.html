<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resultados de búsqueda - Tienda Online</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="ml-header">
    <div class="container py-2">
      <div class="d-flex gap-3 align-items-center">
        <a class="ml-brand" href="index.html">Tienda Online</a>
        <form class="flex-grow-1" role="search" onsubmit="return false;">
          <input class="form-control" id="busquedaResultados" type="search" placeholder="Buscar productos, marcas y más..." aria-label="Buscar">
        </form>
        <a class="btn btn-outline-dark position-relative" href="carrito.html" aria-label="Carrito">
          Carrito
          <span id="cartCount" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" style="display:none;">0</span>
        </a>
      </div>
      <div class="d-flex gap-3 mt-2 small align-items-center flex-wrap">
        <a class="text-dark text-decoration-none" href="categorias.html">Categorías</a>
        <a class="text-dark text-decoration-none" href="producto.html">Productos</a>
        <a class="text-dark text-decoration-none" href="mis-pedidos.html">Mis pedidos</a>
        <span id="navAdmin" style="display:none;"><a class="text-dark text-decoration-none" href="admin.html">Administración</a></span>
        <span id="navGuest"><a class="text-dark text-decoration-none" href="login.html">Iniciar sesión</a> <a class="text-dark text-decoration-none" href="registro.html">Registrarse</a></span>
        <span id="navUser" style="display:none;" class="ms-auto d-flex gap-3 align-items-center">
          <a class="text-dark text-decoration-none" href="perfil.html"><span id="navUserName">Mi cuenta</span></a>
          <button class="btn btn-sm btn-outline-dark" type="button" id="btnLogout">Cerrar sesión</button>
        </span>
      </div>
    </div>
  </header>

  <main class="container my-4">
    <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-3">
      <h1 class="h4 mb-0">Resultados de búsqueda</h1>
      <div class="d-flex align-items-center gap-2">
        <label for="ordenBusqueda" class="small text-muted mb-0">Ordenar:</label>
        <select id="ordenBusqueda" class="form-select form-select-sm" style="width:auto;">
          <option value="relevancia" selected>Relevancia</option>
          <option value="precio_asc">Precio: menor a mayor</option>
          <option value="precio_desc">Precio: mayor a menor</option>
          <option value="nombre_asc">Nombre: A-Z</option>
          <option value="nombre_desc">Nombre: Z-A</option>
        </select>
      </div>
    </div>
    <div id="resumenBusqueda" class="small text-muted mb-3"></div>
    <div id="resultadosBusqueda" class="row"></div>
    <nav id="paginacionBusquedaWrap" class="mt-2" aria-label="Paginación de resultados" style="display:none;">
      <ul id="paginacionBusqueda" class="pagination pagination-sm justify-content-center mb-0"></ul>
    </nav>
  </main>

  <footer class="bg-dark text-white text-center py-3 mt-5">
    <div class="container small">© 2025 Tienda Online — Todos los derechos reservados</div>
  </footer>

  <script src="config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="ui-kit.js"></script>
  <script src="auth-ui.js"></script>
  <script src="busqueda.js"></script>
</body>
</html>
