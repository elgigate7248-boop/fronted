<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestión de Pedidos - Tienda Online</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="styles.css">
  <style>
    :root {
      --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      --success-gradient: linear-gradient(135deg, #84fab0 0%, #8fd3f4 100%);
      --danger-gradient: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      --warning-gradient: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
    }
    
    .page-header {
      background: var(--primary-gradient);
      color: white;
      padding: 2rem 0;
      margin-bottom: 2rem;
      border-radius: 0 0 1rem 1rem;
    }
    
    .stat-card {
      border: none;
      border-radius: 1rem;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      overflow: hidden;
    }
    
    .stat-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 15px rgba(0,0,0,0.2);
    }
    
    .stat-card .card-body {
      padding: 1.5rem;
    }
    
    .stat-icon {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      color: white;
      margin-bottom: 1rem;
    }
    
    .stat-icon.primary { background: var(--primary-gradient); }
    .stat-icon.success { background: var(--success-gradient); }
    .stat-icon.warning { background: var(--warning-gradient); }
    .stat-icon.danger { background: var(--danger-gradient); }
    
    .pedido-card {
      border-left: 4px solid #667eea;
      transition: all 0.3s ease;
    }
    
    .pedido-card:hover {
      border-left-width: 6px;
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.2);
    }
    
    .estado-badge {
      font-size: 0.75rem;
      padding: 0.5rem 1rem;
      border-radius: 2rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    .filter-section {
      background: #f8f9fa;
      border-radius: 1rem;
      padding: 1.5rem;
      margin-bottom: 2rem;
    }
    
    .action-buttons .btn {
      margin: 0.25rem;
      border-radius: 0.5rem;
      padding: 0.5rem 1rem;
      font-size: 0.875rem;
    }
    
    .timeline-item {
      position: relative;
      padding-left: 2rem;
      margin-bottom: 1rem;
    }
    
    .timeline-item::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0.5rem;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #667eea;
    }
    
    .timeline-item::after {
      content: '';
      position: absolute;
      left: 4px;
      top: 1rem;
      width: 2px;
      height: calc(100% + 0.5rem);
      background: #e9ecef;
    }
    
    .timeline-item:last-child::after {
      display: none;
    }
    
    .search-box {
      position: relative;
    }
    
    .search-box input {
      padding-left: 2.5rem;
      border-radius: 2rem;
      border: 2px solid #e9ecef;
      transition: border-color 0.3s ease;
    }
    
    .search-box input:focus {
      border-color: #667eea;
      box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
    }
    
    .search-box i {
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      color: #6c757d;
    }
  </style>
</head>
<body>
  <!-- Header -->
  <header class="page-header">
    <div class="container">
      <div class="row align-items-center">
        <div class="col-md-6">
          <h1 class="h2 mb-2">
            <i class="fas fa-shopping-cart me-3"></i>
            Gestión de Pedidos
          </h1>
          <p class="mb-0 opacity-75">Administra todos los pedidos del sistema</p>
        </div>
        <div class="col-md-6 text-md-end">
          <div class="d-flex gap-2 justify-content-md-end">
            <button class="btn btn-light" onclick="exportarPedidos()">
              <i class="fas fa-download me-2"></i>Exportar
            </button>
            <button class="btn btn-success" onclick="crearPedidoManual()">
              <i class="fas fa-plus me-2"></i>Nuevo Pedido
            </button>
          </div>
        </div>
      </div>
    </div>
  </header>

  <main class="container">
    <!-- Estadísticas -->
    <section class="row mb-4">
      <div class="col-md-3 col-sm-6 mb-3">
        <div class="card stat-card">
          <div class="card-body">
            <div class="stat-icon primary">
              <i class="fas fa-shopping-bag"></i>
            </div>
            <h3 class="h5 mb-1" id="totalPedidos">-</h3>
            <p class="text-muted mb-0">Total Pedidos</p>
          </div>
        </div>
      </div>
      <div class="col-md-3 col-sm-6 mb-3">
        <div class="card stat-card">
          <div class="card-body">
            <div class="stat-icon success">
              <i class="fas fa-dollar-sign"></i>
            </div>
            <h3 class="h5 mb-1" id="ventasTotales">-</h3>
            <p class="text-muted mb-0">Ventas Totales</p>
          </div>
        </div>
      </div>
      <div class="col-md-3 col-sm-6 mb-3">
        <div class="card stat-card">
          <div class="card-body">
            <div class="stat-icon warning">
              <i class="fas fa-clock"></i>
            </div>
            <h3 class="h5 mb-1" id="pedidosPendientes">-</h3>
            <p class="text-muted mb-0">Pendientes</p>
          </div>
        </div>
      </div>
      <div class="col-md-3 col-sm-6 mb-3">
        <div class="card stat-card">
          <div class="card-body">
            <div class="stat-icon danger">
              <i class="fas fa-chart-line"></i>
            </div>
            <h3 class="h5 mb-1" id="ticketPromedio">-</h3>
            <p class="text-muted mb-0">Ticket Promedio</p>
          </div>
        </div>
      </div>
    </section>

    <!-- Filtros -->
    <section class="filter-section">
      <div class="row g-3">
        <div class="col-md-4">
          <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" class="form-control" id="busquedaPedido" placeholder="Buscar por número, cliente...">
          </div>
        </div>
        <div class="col-md-2">
          <select class="form-select" id="filtroEstado">
            <option value="">Todos los estados</option>
            <option value="1">Pendiente</option>
            <option value="2">Pagado</option>
            <option value="3">Enviado</option>
            <option value="4">Entregado</option>
            <option value="5">Cancelado</option>
          </select>
        </div>
        <div class="col-md-2">
          <input type="date" class="form-control" id="fechaDesde" placeholder="Desde">
        </div>
        <div class="col-md-2">
          <input type="date" class="form-control" id="fechaHasta" placeholder="Hasta">
        </div>
        <div class="col-md-2">
          <button class="btn btn-primary w-100" onclick="aplicarFiltros()">
            <i class="fas fa-filter me-2"></i>Filtrar
          </button>
        </div>
      </div>
    </section>

    <!-- Lista de Pedidos -->
    <section>
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h3 class="h5 mb-0">
          <i class="fas fa-list me-2"></i>
          Lista de Pedidos
          <span class="badge bg-secondary ms-2" id="countPedidos">0</span>
        </h3>
        <div class="d-flex gap-2">
          <select class="form-select form-select-sm" style="width: auto;" id="ordenamiento">
            <option value="fecha_desc">Más recientes</option>
            <option value="fecha_asc">Más antiguos</option>
            <option value="total_desc">Mayor monto</option>
            <option value="total_asc">Menor monto</option>
          </select>
        </div>
      </div>
      
      <div id="listaPedidos">
        <div class="text-center py-5">
          <div class="loading-spinner"></div>
          <div class="text-muted mt-2">Cargando pedidos...</div>
        </div>
      </div>
    </section>
  </main>

  <!-- Modal Detalle Pedido -->
  <div class="modal fade" id="modalDetallePedido" tabindex="-1">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Detalle del Pedido</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body" id="contenidoModalDetalle">
          <!-- Contenido dinámico -->
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
          <button type="button" class="btn btn-primary" onclick="imprimirPedido()">
            <i class="fas fa-print me-2"></i>Imprimir
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal Cambiar Estado -->
  <div class="modal fade" id="modalCambiarEstado" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Cambiar Estado del Pedido</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div class="mb-3">
            <label class="form-label">Pedido #<span id="pedidoIdEstado"></span></label>
          </div>
          <div class="mb-3">
            <label class="form-label">Nuevo Estado</label>
            <select class="form-select" id="nuevoEstado">
              <option value="1">Pendiente</option>
              <option value="2">Pagado</option>
              <option value="3">Enviado</option>
              <option value="4">Entregado</option>
              <option value="5">Cancelado</option>
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label">Notas (opcional)</label>
            <textarea class="form-control" id="notasEstado" rows="3" placeholder="Añade notas sobre el cambio de estado..."></textarea>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button type="button" class="btn btn-primary" onclick="guardarCambioEstado()">Guardar Cambio</button>
        </div>
      </div>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="auth-ui.js"></script>
  <script src="gestion-pedidos.js"></script>
</body>
</html>
