<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión - Tienda Online</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="auth-page">
  <main class="container" style="max-width:420px;">
    <div class="text-center mb-4">
      <a href="index.html" class="text-decoration-none">
        <h1 class="fw-bold" style="color:#ffe600;">Tienda Online</h1>
      </a>
    </div>
    <div class="card login-card p-4">
      <h2 class="h4 mb-3 text-center">Iniciar Sesión</h2>
      <form id="loginForm">
        <div class="mb-3">
          <label for="email" class="form-label">Correo electrónico</label>
          <input type="email" class="form-control" id="email" placeholder="tu@correo.com" required>
        </div>
        <div class="mb-3">
          <label for="password" class="form-label">Contraseña</label>
          <input type="password" class="form-control" id="password" placeholder="Tu contraseña" required>
        </div>
        <button type="submit" class="btn btn-dark w-100 py-2 fw-semibold">Ingresar</button>
      </form>
      <div id="loginMsg" class="mt-3"></div>
      <p class="mt-3 mb-0 text-center small">¿No tienes cuenta? <a href="registro.html" class="fw-semibold">Regístrate aquí</a></p>
    </div>
  </main>
  <script>
    document.getElementById('loginForm').onsubmit = async function(e) {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const msg = document.getElementById('loginMsg');
      const btn = this.querySelector('button[type="submit"]');
      msg.textContent = '';
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span> Ingresando...';
      try {
        const res = await fetch(`${API_BASE}/usuario/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (res.ok && data.token) {
          localStorage.setItem('token', data.token);
          if (data.usuario) {
            localStorage.setItem('user', JSON.stringify(data.usuario));
          }
          msg.innerHTML = '<div class="alert alert-success">¡Bienvenido!</div>';
          const rolesRaw = (data.usuario && Array.isArray(data.usuario.roles)) ? data.usuario.roles : [];
          const roles = rolesRaw
            .map(r => (r && typeof r === 'object') ? r.nombre : r)
            .filter(Boolean);
          const esAdminOVendedor = roles.includes('ADMIN') || roles.includes('VENDEDOR') || roles.includes('SUPER_ADMIN');
          // Support ?redirect= param
          const params = new URLSearchParams(window.location.search);
          const redirect = params.get('redirect');
          setTimeout(() => {
            location.href = redirect || (esAdminOVendedor ? 'admin.html' : 'index.html');
          }, 600);
        } else {
          msg.innerHTML = '<div class="alert alert-danger">' + (data.error || 'Credenciales inválidas') + '</div>';
          btn.disabled = false;
          btn.textContent = 'Ingresar';
        }
      } catch {
        msg.innerHTML = '<div class="alert alert-danger">Error de conexión.</div>';
        btn.disabled = false;
        btn.textContent = 'Ingresar';
      }
    }
  </script>
  <script src="config.js"></script>
</body>
</html>
