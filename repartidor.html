<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel de Repartidor - Tienda Online</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root { --primary: #667eea; --primary-dark: #764ba2; }
    body { background: #f0f2f5; font-family: 'Segoe UI', sans-serif; }

    .ml-header {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      color: white; padding: 12px 0; box-shadow: 0 2px 10px rgba(0,0,0,.2);
    }
    .ml-brand { color: white; font-weight: 700; font-size: 1.3rem; text-decoration: none; }

    .stat-card { border: none; border-radius: 12px; transition: transform .2s; }
    .stat-card:hover { transform: translateY(-2px); }

    .pedido-card { border: none; border-radius: 12px; background: white; box-shadow: 0 2px 8px rgba(0,0,0,.08); transition: box-shadow .2s; }
    .pedido-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,.14); }

    .estado-chip { display:inline-flex; align-items:center; gap:6px; padding:4px 12px; border-radius:20px; font-size:12px; font-weight:600; }
    .estado-preparando { background:#ede9fe; color:#7c3aed; }
    .estado-encamino   { background:#e0f2fe; color:#0284c7; }
    .estado-entregado  { background:#dcfce7; color:#16a34a; }

    .btn-action { border-radius: 8px; font-weight: 600; font-size: 13px; }
    .sidebar-stat { background: rgba(255,255,255,.12); border-radius: 10px; padding: 12px 16px; margin-bottom: 8px; }
  </style>
</head>
<body>

  <!-- Header -->
  <header class="ml-header">
    <div class="container">
      <div class="d-flex justify-content-between align-items-center">
        <div class="d-flex align-items-center gap-3">
          <a class="ml-brand" href="index.html">
            <i class="fas fa-motorcycle me-2"></i>Tienda Online
          </a>
          <span class="badge bg-light text-dark px-3 py-2">
            <i class="fas fa-hard-hat me-1"></i>REPARTIDOR
          </span>
        </div>
        <div class="d-flex align-items-center gap-3">
          <span class="text-white small" id="currentTime"></span>
          <div class="d-flex align-items-center gap-2">
            <div class="rounded-circle bg-white d-flex align-items-center justify-content-center fw-bold text-primary"
                 style="width:36px;height:36px;" id="userAvatar">R</div>
            <span class="text-white small" id="repartidorName">Repartidor</span>
          </div>
          <button class="btn btn-sm btn-outline-light" onclick="cerrarSesion()">
            <i class="fas fa-sign-out-alt me-1"></i>Salir
          </button>
        </div>
      </div>
    </div>
  </header>

  <div class="container my-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <div>
        <h1 class="h3 mb-1"><i class="fas fa-truck me-2 text-primary"></i>Panel de Repartidor</h1>
        <p class="text-muted mb-0">Gestiona tus entregas asignadas</p>
      </div>
      <button class="btn btn-primary" onclick="cargarPedidos()">
        <i class="fas fa-sync-alt me-1"></i>Actualizar
      </button>
    </div>

    <!-- Stats row -->
    <div class="row g-3 mb-4">
      <div class="col-6 col-md-3">
        <div class="card stat-card bg-warning text-white h-100">
          <div class="card-body d-flex align-items-center gap-3">
            <i class="fas fa-box-open fa-2x opacity-75"></i>
            <div>
              <div class="h4 mb-0 fw-bold" id="statPreparando">—</div>
              <div class="small">Por recoger</div>
            </div>
          </div>
        </div>
      </div>
      <div class="col-6 col-md-3">
        <div class="card stat-card bg-info text-white h-100">
          <div class="card-body d-flex align-items-center gap-3">
            <i class="fas fa-truck fa-2x opacity-75"></i>
            <div>
              <div class="h4 mb-0 fw-bold" id="statEnCamino">—</div>
              <div class="small">En camino</div>
            </div>
          </div>
        </div>
      </div>
      <div class="col-6 col-md-3">
        <div class="card stat-card bg-success text-white h-100">
          <div class="card-body d-flex align-items-center gap-3">
            <i class="fas fa-check-circle fa-2x opacity-75"></i>
            <div>
              <div class="h4 mb-0 fw-bold" id="statTotal">—</div>
              <div class="small">Total hoy</div>
            </div>
          </div>
        </div>
      </div>
      <div class="col-6 col-md-3">
        <div class="card stat-card bg-primary text-white h-100">
          <div class="card-body d-flex align-items-center gap-3">
            <i class="fas fa-dollar-sign fa-2x opacity-75"></i>
            <div>
              <div class="h4 mb-0 fw-bold" id="statMonto">—</div>
              <div class="small">Monto total</div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Filtro rápido -->
    <div class="d-flex gap-2 mb-3 flex-wrap">
      <button class="btn btn-outline-secondary btn-sm active" id="filtroTodos" onclick="filtrarPedidos('todos')">
        Todos
      </button>
      <button class="btn btn-outline-warning btn-sm" id="filtroPrep" onclick="filtrarPedidos('preparando')">
        <i class="fas fa-box me-1"></i>Preparando
      </button>
      <button class="btn btn-outline-info btn-sm" id="filtroCamino" onclick="filtrarPedidos('encamino')">
        <i class="fas fa-truck me-1"></i>En camino
      </button>
    </div>

    <!-- Lista de pedidos -->
    <div id="listaPedidos">
      <div class="text-center py-5 text-muted">
        <span class="spinner-border me-2"></span>Cargando pedidos...
      </div>
    </div>
  </div>

  <!-- Toast container -->
  <div id="toastContainer" style="position:fixed;top:16px;right:16px;z-index:9999;display:flex;flex-direction:column;gap:8px;"></div>

  <script src="config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="repartidor.js"></script>
</body>
</html>
